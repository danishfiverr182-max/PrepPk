<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="/favicon.svg" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrepPK: Pakistan's #1 Armed Forces Mock Test Platform</title>
    <meta name="description" content="Prepare smarter for Army, Navy, Air Force, KPPSC, and FPSC tests with thousands of real-pattern MCQs. Pakistan's most trusted mock test platform." />
    <!-- Fonts (Outfit + Inter) are self-hosted via @fontsource, imported in src/index.css.
         No external Google Fonts request needed — avoids a blocking DNS +
         connection + round-trip to fonts.gstatic.com before text can render. -->
    <script>
      (function() {
        var theme = localStorage.getItem("prepPkTheme");
        var isDark = theme === "dark" ||
          (theme !== "light" && window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (isDark) document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body class="bg-bg text-txt-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
